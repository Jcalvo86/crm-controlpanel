<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Control - CRM Autónomo (Firebase)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= VISTA DE AUTENTICACIÓN (LOGIN) ================= -->
  <div id="auth-view" class="auth-container">
    <div class="auth-card">
      <div class="brand">
        <h1>Sueño <span>Travel</span></h1>
        <p>Panel de Administración</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Correo Electrónico</label>
          <input type="email" id="login-email" class="form-control" placeholder="admin@ejemplo.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" id="login-btn">
          <span>Entrar</span>
        </button>
      </form>
    </div>
  </div>

  <!-- ================= VISTA DEL DASHBOARD (PANEL) ================= -->
  <div id="dashboard-view" class="dashboard" style="display: none;">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div>
        <div class="brand" style="margin-bottom: 20px; text-align: left;">
          <h1 style="font-size: 1.5rem;">Sueño <span>CRM</span></h1>
          <p style="font-size: 0.8rem;">Panel de Gestión (Firebase)</p>
        </div>
        <ul class="sidebar-menu">
          <li class="sidebar-item">
            <a href="#" class="sidebar-link active" data-tab="blogs">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
              </svg>
              <span>Blogs</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a href="#" class="sidebar-link" data-tab="gallery">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375 0 11-.75 0 .375 0 01.75 0z" />
              </svg>
              <span>Fotos</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a href="#" class="sidebar-link" data-tab="products">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375 0 11-.75 0 .375 0 01.75 0zm7.5 0a.375 0 11-.75 0 .375 0 01.75 0z" />
              </svg>
              <span>Productos</span>
            </a>
          </li>
        </ul>
      </div>

      <button id="logout-btn" class="btn btn-secondary btn-sm" style="display: flex; gap: 8px; justify-content: center; width: 100%;">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 16px; height: 16px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </aside>

    <!-- Contenido Principal -->
    <main class="main-content">
      <!-- Encabezado de Sección Dinámico -->
      <div class="header-panel">
        <div>
          <h2 id="section-title">Blogs</h2>
          <p id="section-desc" style="color: var(--text-secondary); margin-top: 5px;">Administra los artículos publicados en tu web.</p>
        </div>
        <button id="add-item-btn" class="btn btn-sm" style="width: auto; padding: 10px 20px; display: flex; gap: 8px; align-items: center;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" style="width: 18px; height: 18px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
          </svg>
          <span id="add-btn-text">Nuevo Blog</span>
        </button>
      </div>

      <!-- Grid de Contenido -->
      <div id="content-list" class="content-grid">
        <!-- Los elementos cargados por JS irán aquí -->
      </div>
    </main>
  </div>

  <!-- ================= FORMULARIO MODAL (CREAR / EDITAR) ================= -->
  <div id="item-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">Agregar Artículo</h3>
        <button class="close-btn" id="close-modal">&times;</button>
      </div>
      <form id="item-form">
        <input type="hidden" id="item-id">
        <div class="modal-body">
          
          <!-- Vista previa y subida de imagen -->
          <div class="form-group">
            <label>Imagen Destacada</label>
            <div id="image-preview" class="image-preview">
              <div class="image-preview-placeholder" id="image-placeholder">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375 0 11-.75 0 .375 0 01.75 0z" />
                </svg>
                <span>Hacer clic para subir imagen</span>
              </div>
            </div>
            <input type="file" id="image-file" class="hidden-file-input" accept="image/*">
            <input type="hidden" id="image-url">
          </div>

          <!-- Campos dinámicos y fijos -->
          <div class="form-group">
            <label for="item-title">Título / Nombre</label>
            <input type="text" id="item-title" class="form-control" required placeholder="Introduce el título">
          </div>

          <!-- Campo de resumen (para Blog/Producto) -->
          <div class="form-group" id="group-resumen">
            <label for="item-resumen">Descripción Corta / Resumen</label>
            <input type="text" id="item-resumen" class="form-control" placeholder="Introduce una breve descripción">
          </div>

          <!-- Campo de contenido (para Blog/Producto) -->
          <div class="form-group" id="group-contenido">
            <label for="item-content">Contenido / Descripción Detallada</label>
            <textarea id="item-content" class="form-control" rows="6" placeholder="Escribe el contenido detallado aquí..."></textarea>
          </div>

          <!-- Campo de precio (solo para Producto) -->
          <div class="form-group" id="group-precio" style="display: none;">
            <label for="item-price">Precio (€)</label>
            <input type="number" id="item-price" class="form-control" min="0" step="0.01" placeholder="99.99">
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="cancel-modal" style="width: auto;">Cancelar</button>
          <button type="submit" class="btn" id="save-item-btn" style="width: auto;">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notificaciones Flotantes -->
  <div id="toast" class="notification">
    <div id="toast-message">Operación realizada con éxito</div>
  </div>

  <!-- Archivos de lógica y configuración local -->
  <script src="crm-config.js"></script>
  <script type="module" src="crm.js"></script>
</body>
</html>
